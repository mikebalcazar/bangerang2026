<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F1E2C;font-family:'DM Sans',Helvetica,sans-serif}
button,input,textarea{font-family:inherit}
@keyframes cardEntrance{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardSelect{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ccard{animation:cardEntrance 0.35s ease both}
.ccard:nth-child(1){animation-delay:.04s}.ccard:nth-child(2){animation-delay:.08s}
.ccard:nth-child(3){animation-delay:.12s}.ccard:nth-child(4){animation-delay:.16s}
.ccard:nth-child(5){animation-delay:.20s}.ccard:nth-child(6){animation-delay:.24s}
.ccard:nth-child(7){animation-delay:.28s}.ccard:nth-child(8){animation-delay:.32s}
.ccard:nth-child(9){animation-delay:.36s}
.ccard:hover{transform:translateY(-3px)!important;box-shadow:0 8px 24px rgba(0,0,0,0.4)!important}
.ccard-sel{animation:cardSelect 0.3s ease!important}
.tab-btn{transition:background 0.2s,color 0.2s}
.tab-btn:active{transform:scale(0.93)}
.tab-btn .tab-icon{transition:transform 0.2s}
.tab-btn:hover .tab-icon{transform:translateY(-2px) scale(1.15)}
.detail-panel{animation:slideDown 0.2s ease}
.group-detail{animation:fadeIn 0.18s ease}
.tappable-row{transition:background 0.15s,border-color 0.15s;cursor:pointer}
.tappable-row:active{transform:scale(0.99)}
.tl-circle{transition:background 0.2s,transform 0.15s}
.tl-circle:hover{transform:scale(1.1)}
.contact-row{transition:background 0.15s,transform 0.1s}
.contact-row:hover{transform:translateX(2px)}
.btn-orange{transition:opacity 0.15s,transform 0.1s}
.btn-orange:active{transform:scale(0.96)}
html{scroll-behavior:smooth}
input::placeholder{color:rgba(255,255,255,0.3)}
input:focus{border-color:rgba(232,150,26,0.5)!important;outline:none}</style>

function GroupChat({ myNick }) {
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState("");
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    const connect = () => {
      try {
        const es = new EventSource(`${FB}/chat.json`);
        esRef.current = es;
        es.addEventListener("put", (e) => {
          try {
            const { data } = JSON.parse(e.data);
            if (data) {
              const list = Object.entries(data)
                .map(([k,v]) => ({key:k,...v}))
                .sort((a,b) => a.ts - b.ts)
                .slice(-60);
              setMsgs(list);
            } else {
              setMsgs([]);
            }
          } catch(e2) {}
        });
        es.addEventListener("patch", (e) => {
          try {
            const { data } = JSON.parse(e.data);
            if (data) {
              setMsgs(prev => {
                const map = {};
                prev.forEach(m => { map[m.key] = m; });
                Object.entries(data).forEach(([k,v]) => { map[k] = {key:k,...v}; });
                return Object.values(map).sort((a,b)=>a.ts-b.ts).slice(-60);
              });
            }
          } catch(e2) {}
        });
        es.onerror = () => { es.close(); setTimeout(connect, 5000); };
      } catch(e) {}
    };
    connect();
    return () => { if (esRef.current) esRef.current.close(); };
  }, []);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:"smooth" });
  }, [msgs]);

    const t = text.trim();
    if (!t || !myNick || sending) return;
    setSending(true);
    setText("");
    try {
      await fetch(`${FB}/chat.json`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ nick: myNick, text: t, ts: Date.now() })
      });
    } catch(e) {}
    setSending(false);
  };

  const NICK_COLORS = ["#E8961A","#2B9AC8","#2D8A55","#9060C0","#C04040","#1A8080","#C06090","#6060C0","#A06020"];
  const nickColor = (nick) => {
    const idx = COUPLES.findIndex(c => c.nick === nick);
    return NICK_COLORS[idx % NICK_COLORS.length] || C.orange;
  };

  return (
    <div style={{background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"16px", overflow:"hidden", width:"100%", maxWidth:"420px"}}>
      <div style={{padding:"10px 14px 8px", borderBottom:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", gap:"8px"}}>
        <span style={{fontSize:"14px"}}>💬</span>
        <span style={{fontFamily:"'Righteous',sans-serif", fontSize:"12px", letterSpacing:"2px", color:"rgba(255,255,255,0.7)"}}>CHAT DEL GRUPO</span>
        <span style={{marginLeft:"auto", fontSize:"9px", color:"rgba(255,255,255,0.3)"}}>{msgs.length} mensajes</span>
      </div>
      <div style={{height:"220px", overflowY:"auto", padding:"10px 12px", display:"flex", flexDirection:"column", gap:"6px"}}>
        {msgs.length === 0 && (
          <div style={{textAlign:"center", padding:"30px 0", color:"rgba(255,255,255,0.25)", fontSize:"12px"}}>Sé el primero en escribir 👋</div>
        )}
        {msgs.map((m, i) => {
          const isMe = m.nick === myNick;
          return (
            <div key={m.key || i} style={{display:"flex", flexDirection:"column", alignItems: isMe ? "flex-end" : "flex-start"}}>
              {(!isMe || i === 0 || msgs[i-1]?.nick !== m.nick) && (
                <span style={{fontSize:"9px", color: nickColor(m.nick), fontWeight:700, marginBottom:"2px", marginLeft: isMe ? 0 : "4px", marginRight: isMe ? "4px" : 0}}>{m.nick}</span>
              )}
              <div style={{maxWidth:"78%", padding:"7px 11px", borderRadius: isMe ? "14px 14px 4px 14px" : "14px 14px 14px 4px", background: isMe ? C.orange : "rgba(255,255,255,0.1)", color: isMe ? "#fff" : "rgba(255,255,255,0.9)", fontSize:"13px", lineHeight:1.4, wordBreak:"break-word"}}>
                {m.text}
              </div>
              <span style={{fontSize:"8px", color:"rgba(255,255,255,0.2)", marginTop:"2px", marginLeft: isMe ? 0 : "4px", marginRight: isMe ? "4px" : 0}}>
                {new Date(m.ts).toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}
              </span>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"8px 10px", borderTop:"1px solid rgba(255,255,255,0.08)", display:"flex", gap:"8px", alignItems:"center"}}>
        <input
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder={myNick ? `Escribe como ${myNick}...` : "Selecciona tu pareja para escribir"}
          disabled={!myNick}
          style={{flex:1, background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:"20px", padding:"9px 14px", color:"#fff", fontSize:"13px", outline:"none"}}
        />
        <button onClick={send} disabled={!myNick || !text.trim() || sending}
          style={{width:"36px", height:"36px", borderRadius:"50%", background: myNick && text.trim() ? C.orange : "rgba(255,255,255,0.1)", border:"none", color:"#fff", fontSize:"16px", cursor: myNick && text.trim() ? "pointer" : "default", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.2s"}}>
          ›
        </button>
      </div>
    </div>
  );
}

// ── COUPLE SELECTOR ───────────────────────────────────────────────────────────
function CoupleSelector({ onSelect }) {
  const [selected, setSelected] = useState(null);
  const [exiting, setExiting] = useState(false);

  const pick = (c) => { setSelected(c.id); };
  const enter = () => {
    const c = COUPLES.find(x => x.id === selected);
    if (!c) return;
    setExiting(true);
    setTimeout(() => onSelect(c), 350);
  };

  const selCouple = COUPLES.find(c => c.id === selected);

  return (
    <div style={{minHeight:"100vh", background:"linear-gradient(160deg,#1A2A3A 0%,#0F1E2C 40%,#1A3A2A 100%)", display:"flex", flexDirection:"column", alignItems:"center", padding:"28px 14px 32px", opacity:exiting?0:1, transition:"opacity 0.35s"}}>
      {/* Logo */}
      <div style={{textAlign:"center", marginBottom:"20px"}}>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"center", gap:"8px", marginBottom:"4px"}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:"60px", color:"transparent", WebkitTextStroke:"2px rgba(232,150,26,0.9)", letterSpacing:"-2px", lineHeight:1}}>40</div>
          <div style={{paddingTop:"6px"}}>
            {["BAN","GER","ANG"].map(w => <div key={w} style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:"19px", color:"transparent", WebkitTextStroke:"1.2px rgba(255,255,255,0.85)", letterSpacing:"4px", lineHeight:1.15}}>{w}</div>)}
          </div>
        </div>
        <div style={{fontFamily:"'Righteous',sans-serif", fontSize:"10px", letterSpacing:"4px", color:"rgba(255,255,255,0.45)"}}>EUROPA 2026 · ODYSSEY OF THE SEAS</div>
      </div>

      <div style={{fontSize:"11px", color:"rgba(255,255,255,0.5)", marginBottom:"12px", letterSpacing:"1px", textTransform:"uppercase"}}>¿Quiénes son?</div>

      {/* Compact 3-col grid */}
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"7px", width:"100%", maxWidth:"420px", marginBottom:"14px"}}>
        {COUPLES.map((c, i) => {
          const isSel = selected === c.id;
          return (
            <div key={c.id} className={`ccard ${isSel ? "ccard-sel" : ""}`}
              style={{animationDelay:`${i * 0.05}s`, background: isSel ? "linear-gradient(135deg,#E8961A,#2B9AC8)" : "rgba(255,255,255,0.07)", border:`1.5px solid ${isSel ? C.orange : "rgba(255,255,255,0.1)"}`, borderRadius:"10px", padding:"9px 8px", cursor:"pointer", transition:"all 0.2s", textAlign:"center"}}
              onClick={() => pick(c)}>
              <div style={{fontFamily:"'Righteous',sans-serif", fontSize:"12px", fontWeight:700, color: isSel ? "#fff" : "rgba(255,255,255,0.85)", lineHeight:1.3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                {c.nick}
              </div>
            </div>
          );
        })}
      </div>

      {/* Enter button */}
      <div style={{height:"44px", marginBottom:"20px", width:"100%", maxWidth:"420px", display:"flex", justifyContent:"center"}}>
        {selCouple && (
          <button onClick={enter}
            style={{padding:"11px 32px", background:`linear-gradient(135deg,${C.orange},${C.blue})`, border:"none", borderRadius:"22px", color:"#fff", fontFamily:"'Righteous',sans-serif", fontSize:"14px", letterSpacing:"1px", cursor:"pointer", boxShadow:"0 4px 20px rgba(232,150,26,0.4)", animation:"fadeIn 0.2s ease"}}>
            Entrar como {selCouple.nick} →
          </button>
        )}
      </div>

      {/* Group chat */}
      <GroupChat myNick={selCouple?.nick || null} />
      <div style={{marginTop:"14px", fontSize:"9px", color:"rgba(255,255,255,0.2)"}}>🔒 Solo para el grupo 40 Bangerang</div>
    </div>
  );
}

// ── ACTIVITY CARD ─────────────────────────────────────────────────────────────
function ActivityCard({ act, coupleId, rsvps, onRSVP }) {
  const actRsvps = rsvps[act.id] || {};
  const isConfirmed = act.confirmed.includes(coupleId);
  const myRsvp = actRsvps[`c${coupleId}`];
  const isGoing = isConfirmed || myRsvp === true;
  const accentColor = TYPE_COLOR[act.type] || C.blue;

  // Build attendee list
  const confirmedList = COUPLES.filter(c => act.confirmed.includes(c.id));
  const rsvpdList = COUPLES.filter(c => actRsvps[`c${c.id}`] === true && !act.confirmed.includes(c.id));
  const allGoing = [...confirmedList, ...rsvpdList];

  return (
    <div style={{background:C.card, border:`1px solid ${C.border}`, borderLeft:`4px solid ${accentColor}`, borderRadius:"12px", marginBottom:"10px", overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
      {/* Header */}
      <div style={{padding:"12px 13px 8px"}}>
        <div style={{display:"flex", gap:"10px", alignItems:"flex-start"}}>
          <span style={{fontSize:"22px", lineHeight:1}}>{act.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:"13px", fontWeight:700, color:C.text, lineHeight:1.3}}>{act.title}</div>
            <div style={{display:"flex", gap:"8px", marginTop:"4px", flexWrap:"wrap"}}>
              <span style={{fontSize:"11px", color:accentColor, fontWeight:600}}>⏰ {act.time}{act.dur ? ` · ${act.dur}` : ""}</span>
            </div>
            <div style={{fontSize:"11px", color:C.textDim, marginTop:"2px"}}>📍 {act.loc}</div>
            {act.note && <div style={{fontSize:"10px", color:C.blue, marginTop:"5px", padding:"4px 8px", background:C.blueLight, borderRadius:"6px", lineHeight:1.5}}>ℹ️ {act.note}</div>}
          </div>
        </div>
      </div>

      {/* Attendees */}
      {allGoing.length > 0 && (
        <div style={{padding:"6px 13px 8px", borderTop:`1px solid ${C.borderLight}`}}>
          <div style={{fontSize:"9px", color:C.textFaint, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"6px"}}>Quién va ({allGoing.length} {allGoing.length===1?"pareja":"parejas"})</div>
          <div style={{display:"flex", flexWrap:"wrap", gap:"5px"}}>
            {confirmedList.map(c => (
              <span key={c.id} style={{fontSize:"10px", padding:"3px 8px", background:C.greenBg, color:C.green, borderRadius:"20px", border:`1px solid ${C.green}40`, fontWeight:600}}>
                {c.nick}
              </span>
            ))}
            {rsvpdList.map(c => (
              <span key={c.id} style={{fontSize:"10px", padding:"3px 8px", background:C.orangeLight, color:C.orangeText, borderRadius:"20px", border:`1px solid ${C.orangeMid}`, fontWeight:600}}>
                {c.nick}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* RSVP */}
      <div style={{padding:"8px 13px 12px", borderTop:`1px solid ${C.borderLight}`, display:"flex", alignItems:"center", gap:"8px"}}>
        {isConfirmed ? (
          <div style={{display:"flex", alignItems:"center", gap:"6px", fontSize:"11px", color:C.green, fontWeight:600}}>
            <span style={{background:C.greenBg, border:`1px solid ${C.green}40`, padding:"5px 12px", borderRadius:"8px"}}>✓ Confirmado por organizador</span>
          </div>
        ) : act.open ? (
          <button onClick={() => onRSVP(act.id, coupleId, !myRsvp)}
            style={{padding:"7px 18px", background: myRsvp ? C.green : C.card, border:`1.5px solid ${myRsvp ? C.green : C.border}`, borderRadius:"8px", color: myRsvp ? "#fff" : C.textMid, fontSize:"12px", fontWeight:700, cursor:"pointer", transition:"all 0.2s"}}>
            {myRsvp ? "✓ Voy" : "Voy →"}
          </button>
        ) : (
          <div style={{fontSize:"10px", color:C.textFaint, fontStyle:"italic"}}>Actividad de grupo</div>
        )}
      </div>
    </div>
  );
}

function CruiseActivitiesTab({ couple, rsvps, onRSVP }) {
  const [openDay, setOpenDay] = useState(1);
  const dayColors = ["#1A8080","#1A8080","#E8961A","#9060C0","#2B9AC8","#2D8A55","#C04040"];

  const dayFlags = ["🇮🇹","🌊","🇬🇷","🇹🇷","🇬🇷","🌊","🇮🇹"];

  return (
    <div>
      <div style={{fontSize:"10px", color:C.textFaint, textAlign:"center", marginBottom:"12px"}}>Toca "Voy" en las actividades abiertas para armar tu itinerario personal</div>

      <div style={{display:"flex", gap:"7px", overflowX:"auto", paddingBottom:"4px", marginBottom:"14px"}}>

          <button key={d.num} onClick={()=>setOpenDay(d.num)}
            style={{flexShrink:0, padding:"8px 12px", background:openDay===d.num?dayColors[i]:"rgba(0,0,0,0.05)", border:`1.5px solid ${openDay===d.num?dayColors[i]:C.border}`, borderRadius:"20px", color:openDay===d.num?"#fff":C.textDim, fontSize:"11px", fontWeight:600, cursor:"pointer", transition:"all 0.2s", whiteSpace:"nowrap"}}>

function MyPlanTab({ couple, rsvps }) {
  const myActs = ACTIVITIES.filter(act => {
    const isConf = act.confirmed.includes(couple.id);
    const rsvpd = (rsvps[act.id] || {})[`c${couple.id}`] === true;
    return isConf || rsvpd;
  });

  if (myActs.length === 0) {
    return <div style={{textAlign:"center", padding:"40px 20px", color:C.textFaint}}>
      <div style={{fontSize:"32px", marginBottom:"10px"}}>📅</div>
      <div style={{fontSize:"13px"}}>Aún no has marcado ninguna actividad</div>
      <div style={{fontSize:"11px", marginTop:"6px", color:C.textFaint}}>Ve al tab CRUCERO y toca "Voy" en las actividades que te interesan</div>
    </div>;
  }

  const grouped = {};
  myActs.forEach(a => { if (!grouped[a.day]) grouped[a.day] = []; grouped[a.day].push(a); });

  return (
    <div>
      <div style={{fontSize:"10px", color:C.textFaint, textAlign:"center", marginBottom:"14px"}}>Tu itinerario personal en el crucero</div>
      {Object.entries(grouped).map(([day, acts]) => (
        <div key={day}>
          <div style={{fontFamily:"'Righteous',sans-serif", fontSize:"10px", color:C.orangeText, letterSpacing:"2px", textTransform:"uppercase", marginBottom:"8px", marginTop:"14px"}}>
            📅 {acts[0].date} · {acts[0].port.split(" ")[0]}
          </div>
          {acts.sort((a,b)=>a.time.localeCompare(b.time)).map(act => (
            <div key={act.id} style={{background:C.card, border:`1px solid ${C.border}`, borderLeft:`4px solid ${TYPE_COLOR[act.type]||C.blue}`, borderRadius:"10px", padding:"10px 13px", marginBottom:"8px", display:"flex", gap:"10px", alignItems:"center"}}>
              <span style={{fontSize:"20px"}}>{act.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:"12px", fontWeight:600, color:C.text}}>{act.title}</div>
                <div style={{fontSize:"11px", color:C.textDim}}>{act.time}{act.dur ? ` · ${act.dur}` : ""}</div>
                <div style={{fontSize:"10px", color:C.textFaint}}>📍 {act.loc}</div>
              </div>
              {act.confirmed.includes(couple.id) && <span style={{fontSize:"10px", color:C.green, fontWeight:700}}>✓</span>}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function DayNotes({dayIndex}){
  const [notes,setNotes]=useState("");
  const [docName,setDocName]=useState("");
  const [docData,setDocData]=useState(null);
  const [editing,setEditing]=useState(false);
  const NK=`note_${dayIndex}`;
  const DK=`doc_${dayIndex}`;
  useEffect(()=>{
    try{const r=localStorage.getItem(NK);if(r)setNotes(r);}catch(e){}
    try{const r=localStorage.getItem(DK);if(r){const p=JSON.parse(r);setDocData(p.data);setDocName(p.name);}}catch(e){}
  },[]);
  const saveNotes=()=>{try{localStorage.setItem(NK,notes);}catch(e){}setEditing(false);};
  const delNotes=()=>{try{localStorage.removeItem(NK);}catch(e){}setNotes("");setEditing(false);};
  const handleFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>3*1024*1024){alert("Máximo 3MB");return;}
    const r=new FileReader();
    r.onload=(ev)=>{const data=ev.target.result;try{localStorage.setItem(DK,JSON.stringify({data,name:file.name}));}catch(e){}setDocData(data);setDocName(file.name);};
    r.readAsDataURL(file);
  };
  const delDoc=()=>{try{localStorage.removeItem(DK);}catch(e){}setDocData(null);setDocName("");};
  return <div style={{marginTop:"12px",borderTop:`1px dashed ${C.border}`,paddingTop:"12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
      <div style={{fontSize:"9px",color:C.textFaint,letterSpacing:"2px",textTransform:"uppercase"}}>📝 Mis notas</div>
      {!editing&&<button onClick={()=>setEditing(true)} style={{fontSize:"10px",color:C.blue,background:"none",border:`1px solid ${C.blue}`,borderRadius:"6px",padding:"3px 8px",cursor:"pointer"}}>{notes.trim()?"✏️ Editar":"+ Nota"}</button>}
    </div>
    {editing?<div>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Escribe aquí..." style={{width:"100%",minHeight:"70px",background:C.bg,border:`1.5px solid ${C.blue}`,borderRadius:"8px",padding:"10px",fontSize:"12px",color:C.text,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
      <div style={{display:"flex",gap:"6px",marginTop:"6px"}}>
        <button onClick={saveNotes} style={{flex:1,padding:"8px",background:C.blue,border:"none",borderRadius:"8px",color:"#fff",fontSize:"12px",cursor:"pointer",fontWeight:600}}>✅ Guardar</button>
        <button onClick={()=>setEditing(false)} style={{padding:"8px 12px",background:"none",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.textDim,fontSize:"12px",cursor:"pointer"}}>×</button>
        {notes.trim()&&<button onClick={delNotes} style={{padding:"8px 10px",background:"none",border:`1px solid ${C.red}`,borderRadius:"8px",color:C.red,fontSize:"12px",cursor:"pointer"}}>🗑️</button>}
      </div>
    </div>:notes.trim()?<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:"8px",padding:"10px",fontSize:"12px",color:C.textMid,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{notes}</div>:null}
    <div style={{marginTop:"10px"}}>
      {docData?<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:C.orangeLight,border:`1px solid ${C.orangeMid}`,borderRadius:"8px"}}>
        <span style={{fontSize:"16px"}}>📄</span>
        <div style={{flex:1}}><div style={{fontSize:"11px",fontWeight:600,color:C.orangeText}}>{docName}</div></div>
        <button onClick={()=>openPDF(docData,docName)} style={{fontSize:"10px",padding:"4px 8px",background:C.orange,border:"none",borderRadius:"6px",color:"#fff",cursor:"pointer"}}>Ver</button>
        <button onClick={delDoc} style={{fontSize:"10px",padding:"4px 8px",background:"none",border:`1px solid ${C.red}`,borderRadius:"6px",color:C.red,cursor:"pointer"}}>🗑️</button>
      </div>:<label style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",background:C.bg,border:`1.5px dashed ${C.border}`,borderRadius:"8px",cursor:"pointer"}}>
        <span style={{fontSize:"16px"}}>📎</span>
        <div><div style={{fontSize:"11px",color:C.textMid,fontWeight:600}}>Subir doc</div><div style={{fontSize:"10px",color:C.textFaint}}>PDF · máx 3MB</div></div>
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" onChange={handleFile} style={{display:"none"}}/>
      </label>}
    </div>
  </div>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [couple, setCouple] = useState(null);
  const [rsvps, setRsvps] = useState({});
  const esRef = useRef(null);

  useEffect(() => {
    // Load fonts
    const l = document.createElement("link");
    l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Righteous&family=DM+Sans:wght@400;500;600&display=swap";
    document.head.appendChild(l);

    // Load saved couple
    try {
      const saved = localStorage.getItem("bg_couple");
      if (saved) setCouple(JSON.parse(saved));
    } catch(e) {}

    // Firebase SSE
    const connect = () => {
      try {
        const es = new EventSource(`${FB}/rsvps.json`);
        esRef.current = es;
        es.addEventListener("put", (event) => {
          try {
            const { path, data } = JSON.parse(event.data);
            if (path === "/" ) {
              setRsvps(data || {});
            } else {
              const keys = path.split("/").filter(Boolean);
              setRsvps(prev => {
                const next = JSON.parse(JSON.stringify(prev));
                let obj = next;
                for (let i = 0; i < keys.length - 1; i++) {
                  if (!obj[keys[i]]) obj[keys[i]] = {};
                  obj = obj[keys[i]];
                }
                obj[keys[keys.length - 1]] = data;
                return next;
              });
            }
          } catch(e) {}
        });
        es.onerror = () => {
          es.close();
          setTimeout(connect, 5000);
        };
      } catch(e) {}
    };
    connect();
    return () => { if (esRef.current) esRef.current.close(); };
  }, []);

  const handleSelectCouple = (c) => {
    try { localStorage.setItem("bg_couple", JSON.stringify(c)); } catch(e) {}
    setCouple(c);
  };

  const handleSwitch = () => {
    try { localStorage.removeItem("bg_couple"); } catch(e) {}
    setCouple(null);
  };

  const handleRSVP = async (actId, coupleId, going) => {
    // Optimistic update
    setRsvps(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[actId]) next[actId] = {};
      next[actId][`c${coupleId}`] = going;
      return next;
    });
    await fbSet(`rsvps/${actId}/c${coupleId}`, going);
  };

  if (!couple) return <CoupleSelector onSelect={handleSelectCouple} />;
  if (couple.admin) return <AdminApp couple={couple} rsvps={rsvps} onRSVP={handleRSVP} onSwitch={handleSwitch} />;
  return <GuestApp couple={couple} rsvps={rsvps} onRSVP={handleRSVP} onSwitch={handleSwitch} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
